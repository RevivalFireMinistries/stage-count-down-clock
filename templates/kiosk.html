<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stage Timer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;700;800;900&family=Oswald:wght@200;300;400;500;600;700&family=Bebas+Neue&family=Orbitron:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@200;300;400;500;600;700;800&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Flip theme (default - ice blue) */
            --t-bg: #050a14;
            --t-glow: #7dd3fc;
            --t-text: #bae6fd;
            --t-dim: rgba(186,230,253,0.25);
            --t-panel: rgba(186,230,253,0.04);
            --t-panel-border: rgba(186,230,253,0.08);
            --t-warn: #f59e0b;
            --t-crit: #ef4444;
            --t-green: #22c55e;
            --t-gold: #fbbf24;
            --t-shadow: 0 0 80px rgba(125,211,252,0.15), 0 0 200px rgba(125,211,252,0.05);
            --t-text-shadow: 0 0 40px rgba(125,211,252,0.5), 0 0 80px rgba(125,211,252,0.2);
        }

        body.theme-minimal {
            --t-bg: #000000;
            --t-glow: #ffffff;
            --t-text: #e8e8e8;
            --t-dim: rgba(255,255,255,0.2);
            --t-panel: transparent;
            --t-panel-border: transparent;
            --t-warn: #f59e0b;
            --t-crit: #ef4444;
            --t-green: #22c55e;
            --t-gold: #fbbf24;
            --t-shadow: none;
            --t-text-shadow: none;
        }

        body.theme-neon {
            --t-bg: #0a0015;
            --t-glow: #c084fc;
            --t-text: #e9d5ff;
            --t-dim: rgba(192,132,252,0.25);
            --t-panel: rgba(192,132,252,0.04);
            --t-panel-border: rgba(192,132,252,0.1);
            --t-warn: #fb923c;
            --t-crit: #f43f5e;
            --t-green: #34d399;
            --t-gold: #fbbf24;
            --t-shadow: 0 0 80px rgba(192,132,252,0.2), 0 0 200px rgba(192,132,252,0.05);
            --t-text-shadow: 0 0 40px rgba(192,132,252,0.6), 0 0 80px rgba(192,132,252,0.25);
        }

        body.theme-warm {
            --t-bg: #0f0906;
            --t-glow: #fb923c;
            --t-text: #fed7aa;
            --t-dim: rgba(251,146,60,0.25);
            --t-panel: rgba(251,146,60,0.04);
            --t-panel-border: rgba(251,146,60,0.08);
            --t-warn: #facc15;
            --t-crit: #ef4444;
            --t-green: #4ade80;
            --t-gold: #fbbf24;
            --t-shadow: 0 0 80px rgba(251,146,60,0.15), 0 0 200px rgba(251,146,60,0.05);
            --t-text-shadow: 0 0 40px rgba(251,146,60,0.5), 0 0 80px rgba(251,146,60,0.2);
        }

        body {
            background: var(--t-bg);
            color: var(--t-text);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Font classes ── */
        body.font-inter .digit, body.font-inter .digit-sep, body.font-inter .clock { font-family: 'Inter', sans-serif; }
        body.font-oswald .digit, body.font-oswald .digit-sep, body.font-oswald .clock { font-family: 'Oswald', sans-serif; }
        body.font-bebas .digit, body.font-bebas .digit-sep, body.font-bebas .clock { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
        body.font-orbitron .digit, body.font-orbitron .digit-sep, body.font-orbitron .clock { font-family: 'Orbitron', sans-serif; }
        body.font-mono .digit, body.font-mono .digit-sep, body.font-mono .clock { font-family: 'Roboto Mono', monospace; }
        body.font-jetbrains .digit, body.font-jetbrains .digit-sep, body.font-jetbrains .clock { font-family: 'JetBrains Mono', monospace; }

        /* ── Scenes ── */
        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .scene.active { opacity: 1; pointer-events: auto; }

        /* ── Flip panel (shared digit container) ── */
        .flip-panel {
            background: var(--t-panel);
            border: 1px solid var(--t-panel-border);
            border-radius: clamp(8px, 1.5vw, 24px);
            padding: clamp(1rem, 3vh, 3rem) clamp(1.5rem, 4vw, 5rem);
            position: relative;
            box-shadow: var(--t-shadow);
        }

        /* Horizontal split line */
        .flip-panel::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }

        /* ── Digit display ── */
        .digit-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0;
        }

        .digit-group {
            display: flex;
            align-items: baseline;
        }

        .digit {
            font-size: clamp(6rem, 20vw, 28rem);
            font-weight: 900;
            line-height: 0.9;
            color: var(--t-text);
            text-shadow: var(--t-text-shadow);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .digit-sep {
            font-size: clamp(5rem, 16vw, 22rem);
            font-weight: 200;
            color: var(--t-text);
            text-shadow: var(--t-text-shadow);
            margin: 0 clamp(0.2rem, 0.5vw, 1rem);
            align-self: center;
            line-height: 0.9;
            opacity: 0.7;
        }

        .digit-unit {
            font-size: clamp(0.8rem, 2vw, 2.5rem);
            font-weight: 600;
            color: var(--t-dim);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 0 clamp(0.3rem, 0.8vw, 1.2rem);
            align-self: flex-end;
            padding-bottom: clamp(0.3rem, 0.8vh, 1rem);
        }

        /* ── Labels ── */
        .scene-label {
            font-size: clamp(1.2rem, 3.5vw, 4rem);
            font-weight: 800;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--t-text);
            text-shadow: var(--t-text-shadow);
            margin-bottom: clamp(1rem, 3vh, 4rem);
            opacity: 0.85;
        }

        .scene-sub {
            font-size: clamp(0.7rem, 1.5vw, 1.5rem);
            font-weight: 300;
            color: var(--t-dim);
            letter-spacing: 0.15em;
            margin-top: clamp(1rem, 2.5vh, 3rem);
            text-transform: uppercase;
        }

        /* ── IDLE CLOCK ── */
        #idleScene .clock {
            font-size: clamp(8rem, 22vw, 30rem);
            font-weight: 200;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--t-text);
            text-shadow: var(--t-text-shadow);
        }
        #idleScene .date {
            font-size: clamp(1rem, 2.5vw, 2.5rem);
            font-weight: 300;
            color: var(--t-dim);
            margin-top: 1.5vh;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── TIMER ── */
        .state-warning .digit { color: var(--t-warn); text-shadow: 0 0 40px rgba(245,158,11,0.5); }
        .state-warning .scene-label { color: rgba(245,158,11,0.5); }
        .state-critical .digit { color: var(--t-crit); animation: throb 0.8s ease-in-out infinite; text-shadow: 0 0 40px rgba(239,68,68,0.6); }
        .state-critical .scene-label { color: rgba(239,68,68,0.5); }

        @keyframes throb {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }

        .time-up-display {
            display: none;
        }
        .time-up-display.show {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .time-up-text {
            font-size: clamp(5rem, 16vw, 22rem);
            font-weight: 900;
            color: var(--t-crit);
            animation: throb 0.8s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(239,68,68,0.5);
        }

        /* ── WAITING ── */
        #waitScene .scene-label { color: rgba(251,191,36,0.4); }
        #waitScene .digit { color: var(--t-gold); text-shadow: 0 0 40px rgba(251,191,36,0.4); }
        #waitScene .digit-unit { color: rgba(251,191,36,0.3); }
        #waitScene .digit-sep { color: rgba(251,191,36,0.2); }

        /* ── END ── */
        #endScene .end-text {
            font-size: clamp(5rem, 16vw, 22rem);
            font-weight: 900;
            color: var(--t-green);
            letter-spacing: 0.05em;
            text-shadow: 0 0 60px rgba(34,197,94,0.4);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* ── MESSAGE ── */
        #msgScene {
            background: #000;
            z-index: 100;
            padding: 5vh 5vw;
        }
        #msgScene::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.15) 0%, transparent 70%);
            animation: msgPulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes msgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        #msgScene .msg-text {
            font-weight: 900;
            text-align: center;
            line-height: 1.1;
            max-width: 90vw;
            max-height: 70vh;
            color: #fff;
            text-shadow: 0 0 60px rgba(255,255,255,0.3), 0 0 120px rgba(99,102,241,0.2);
            word-wrap: break-word;
            overflow-wrap: break-word;
            z-index: 1;
        }
        /* Auto-size: fewer chars = bigger text */
        #msgScene .msg-text.msg-xs { font-size: clamp(5rem, 14vw, 18rem); }  /* 1-20 chars */
        #msgScene .msg-text.msg-sm { font-size: clamp(3.5rem, 10vw, 14rem); } /* 21-50 chars */
        #msgScene .msg-text.msg-md { font-size: clamp(2.5rem, 7vw, 10rem); }  /* 51-80 chars */
        #msgScene .msg-text.msg-lg { font-size: clamp(1.8rem, 5vw, 7rem); }   /* 81-100 chars */

        #msgScene .msg-countdown {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.2rem, 2.5vw, 2.5rem);
            font-weight: 700;
            color: rgba(255,255,255,0.25);
            font-variant-numeric: tabular-nums;
            z-index: 1;
        }
        #msgScene .msg-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255,255,255,0.06);
            z-index: 1;
        }
        #msgScene .msg-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 1s linear;
            box-shadow: 0 0 20px rgba(99,102,241,0.5);
        }

        /* ── Mini timer ── */
        .mini-timer {
            display: none;
            position: fixed;
            bottom: 2.5vh; right: 2.5vw;
            z-index: 101;
            text-align: right;
        }
        .mini-timer.show { display: block; }
        .mini-timer .mini-label {
            font-size: clamp(0.6rem, 1vw, 1rem);
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .mini-timer .mini-time {
            font-size: clamp(1.5rem, 3.5vw, 4rem);
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        /* ── Queued banner ── */
        .queued-banner {
            display: none;
            position: fixed;
            bottom: 2.5vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.7rem, 1.2vw, 1.2rem);
            color: var(--t-dim);
            letter-spacing: 0.1em;
            z-index: 50;
            white-space: nowrap;
        }
        .queued-banner.active { display: flex; gap: 1vw; align-items: center; }
        .queued-banner .q-label {
            font-weight: 700;
            color: rgba(251,191,36,0.4);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* ── Progress ── */
        .progress {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: rgba(255,255,255,0.04);
            z-index: 50;
        }
        .progress .fill {
            height: 100%;
            background: var(--t-glow);
            width: 100%;
            transition: width 1s linear, background 0.5s;
        }
        .progress .fill.warn { background: var(--t-warn); }
        .progress .fill.crit { background: var(--t-crit); }
    </style>
</head>
<body>
    <!-- Idle Clock -->
    <div class="scene active" id="idleScene">
        <div class="clock" id="idleClock">00:00</div>
        <div class="date" id="idleDate"></div>
    </div>

    <!-- Running Timer -->
    <div class="scene" id="timerScene">
        <div class="scene-label" id="activityLabel">COUNTDOWN</div>
        <div class="flip-panel" id="flipPanel">
            <div class="digit-row" id="digitRow">
                <div class="digit-group">
                    <span class="digit" id="d-mm">07</span>
                    <span class="digit-unit">min</span>
                </div>
                <div class="digit-group">
                    <span class="digit" id="d-ss">00</span>
                </div>
            </div>
        </div>
        <div class="scene-sub" id="activitySub"></div>

        <div class="time-up-display" id="timeUpDisplay">
            <span class="time-up-text">TIME UP</span>
        </div>
    </div>

    <!-- Waiting -->
    <div class="scene" id="waitScene">
        <div class="scene-label" id="waitLabel">STARTING IN</div>
        <div class="flip-panel">
            <div class="digit-row">
                <div class="digit-group">
                    <span class="digit" id="w-hh">00</span>
                    <span class="digit-unit">hr</span>
                </div>
                <div class="digit-group">
                    <span class="digit" id="w-mm">00</span>
                    <span class="digit-unit">min</span>
                </div>
                <div class="digit-group">
                    <span class="digit" id="w-ss">00</span>
                </div>
            </div>
        </div>
        <div class="scene-sub" id="waitSub"></div>
    </div>

    <!-- End -->
    <div class="scene" id="endScene">
        <div class="end-text" id="endText">THE END</div>
    </div>

    <!-- Stage Message -->
    <div class="scene" id="msgScene">
        <div class="msg-text msg-xs" id="msgText"></div>
        <div class="msg-countdown" id="msgCountdown"></div>
        <div class="msg-progress"><div class="msg-progress-fill" id="msgFill"></div></div>
    </div>

    <!-- Mini timer -->
    <div class="mini-timer" id="miniTimer">
        <div class="mini-label" id="miniLabel"></div>
        <div class="mini-time" id="miniTime"></div>
    </div>

    <!-- Queued banner -->
    <div class="queued-banner" id="queuedBanner">
        <span class="q-label">Next</span>
        <span id="queuedInfo"></span>
    </div>

    <!-- Progress -->
    <div class="progress"><div class="fill" id="progressFill"></div></div>

    <script>
    (() => {
        let totalSec = 0;
        let endTimer = null;
        let showingEnd = false;
        let currentTheme = '';
        let currentFont = '';
        const pad = n => String(n).padStart(2, '0');

        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function applyTheme(theme) {
            if (theme === currentTheme) return;
            currentTheme = theme;
            rebuildBodyClass();
        }

        function applyFont(font) {
            if (font === currentFont) return;
            currentFont = font;
            rebuildBodyClass();
        }

        function rebuildBodyClass() {
            document.body.className = '';
            if (currentTheme && currentTheme !== 'flip') {
                document.body.classList.add('theme-' + currentTheme);
            }
            if (currentFont && currentFont !== 'inter') {
                document.body.classList.add('font-' + currentFont);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('idleClock').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
            document.getElementById('idleDate').textContent = now.toLocaleDateString('en-US', {
                weekday: 'long', month: 'long', day: 'numeric'
            });
        }

        function parseSecs(t) {
            if (!t || !t.includes(':')) return 0;
            const p = t.split(':').map(Number);
            return p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
        }

        function countdownTo(timeStr) {
            const p = timeStr.split(':');
            if (p.length !== 2) return 0;
            const now = new Date(), t = new Date();
            t.setHours(+p[0], +p[1], 0, 0);
            return Math.max(0, Math.floor((t - now) / 1000));
        }

        function setDigits(prefix, secs, showHours) {
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            const s = secs % 60;

            if (showHours) {
                const hEl = document.getElementById(prefix + '-hh');
                if (hEl) hEl.textContent = pad(h);
            }
            document.getElementById(prefix + '-mm').textContent = pad(showHours ? m : Math.floor(secs / 60));
            document.getElementById(prefix + '-ss').textContent = pad(s);
        }

        function updateDigitLayout(secs) {
            // For timer: show HH:MM:SS if >= 1 hour, else MM:SS
            const row = document.getElementById('digitRow');
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            const s = secs % 60;

            if (h > 0) {
                row.innerHTML = `
                    <div class="digit-group">
                        <span class="digit" id="d-hh">${pad(h)}</span>
                        <span class="digit-unit">hr</span>
                    </div>
                    <div class="digit-group">
                        <span class="digit" id="d-mm">${pad(m)}</span>
                        <span class="digit-unit">min</span>
                    </div>
                    <div class="digit-group">
                        <span class="digit" id="d-ss">${pad(s)}</span>
                    </div>`;
            } else {
                row.innerHTML = `
                    <div class="digit-group">
                        <span class="digit" id="d-mm">${pad(m)}</span>
                        <span class="digit-sep">:</span>
                    </div>
                    <div class="digit-group">
                        <span class="digit" id="d-ss">${pad(s)}</span>
                    </div>`;
            }
        }

        function checkMessage() {
            fetch('/api/stage_message').then(r=>r.json()).then(d => {
                const mini = document.getElementById('miniTimer');
                if (d.has_message && d.message && !d.expired) {
                    // Use server-provided time_remaining (seconds) instead of client date parsing
                    const rem = Math.max(0, (d.time_remaining || 0) * 1000);

                    if (rem <= 0) { dismissMsg(); return; }

                    showScene('msgScene');
                    const msgEl = document.getElementById('msgText');
                    msgEl.textContent = d.message;

                    // Auto-size class based on length
                    msgEl.className = 'msg-text';
                    const len = d.message.length;
                    if (len <= 20) msgEl.classList.add('msg-xs');
                    else if (len <= 50) msgEl.classList.add('msg-sm');
                    else if (len <= 80) msgEl.classList.add('msg-md');
                    else msgEl.classList.add('msg-lg');

                    mini.classList.add('show');

                    const s = Math.floor(rem / 1000);
                    document.getElementById('msgCountdown').textContent =
                        Math.floor(s / 60) + ':' + pad(s % 60);
                    document.getElementById('msgFill').style.width =
                        (rem / (d.duration_seconds * 1000) * 100) + '%';

                    fetch('/api/timer_status').then(r=>r.json()).then(t => {
                        document.getElementById('miniLabel').textContent = t.current_activity || '';
                        document.getElementById('miniTime').textContent = t.time_remaining || '00:00';
                    });
                } else {
                    dismissMsg();
                }
            }).catch(() => {});
        }

        function dismissMsg() {
            // Remove message scene so updateDisplay takes over on next tick
            document.getElementById('msgScene').classList.remove('active');
            document.getElementById('miniTimer').classList.remove('show');
        }

        function updateDisplay() {
            // Don't override active message - checkMessage handles dismissal
            if (document.getElementById('msgScene').classList.contains('active')) return;

            fetch('/api/countdown_timer').then(r=>r.json()).then(cd => {
                if (cd.is_active) { renderCountdown(cd); return; }
                fetch('/api/timer_status').then(r=>r.json()).then(renderTimer);
            });
        }

        function renderCountdown(cd) {
            const scene = document.getElementById('timerScene');
            const panel = document.getElementById('flipPanel');
            const upDisplay = document.getElementById('timeUpDisplay');

            scene.classList.remove('state-warning', 'state-critical');

            document.getElementById('activityLabel').textContent = cd.name || 'COUNTDOWN';
            document.getElementById('activitySub').textContent = '';

            if (cd.is_expired) {
                panel.style.display = 'none';
                upDisplay.classList.add('show');
                showScene('timerScene');
            } else {
                panel.style.display = '';
                upDisplay.classList.remove('show');

                const secs = parseSecs(cd.time_remaining);
                updateDigitLayout(secs);
                showScene('timerScene');

                if (secs <= 10) scene.classList.add('state-critical');
                else if (secs <= 60) scene.classList.add('state-warning');
            }
        }

        function renderTimer(data) {
            const fill = document.getElementById('progressFill');
            const scene = document.getElementById('timerScene');
            const banner = document.getElementById('queuedBanner');
            const panel = document.getElementById('flipPanel');
            const upDisplay = document.getElementById('timeUpDisplay');

            // Apply theme and font
            if (data.kiosk_theme) applyTheme(data.kiosk_theme);
            if (data.kiosk_font) applyFont(data.kiosk_font);

            // Waiting
            if (data.waiting_for_start && !data.is_running) {
                showScene('waitScene');
                document.getElementById('waitLabel').textContent =
                    (data.waiting_program_name || '') + ' \u2022 STARTING IN';
                if (data.scheduled_start_time) {
                    const secs = countdownTo(data.scheduled_start_time);
                    setDigits('w', secs, true);
                    document.getElementById('waitSub').textContent = 'Starts at ' + data.scheduled_start_time;
                }
                fill.style.width = '100%';
                fill.classList.remove('warn', 'crit');
                showingEnd = false;
                if (endTimer) { clearTimeout(endTimer); endTimer = null; }
                banner.classList.remove('active');
                return;
            }

            // Queued banner
            const qp = data.queued_program;
            if (qp && qp.has_queued && data.is_running) {
                banner.classList.add('active');
                const diff = countdownTo(qp.scheduled_start_time);
                const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
                document.getElementById('queuedInfo').textContent =
                    qp.program_name + ' in ' + pad(h) + ':' + pad(m) + ':' + pad(s);
            } else {
                banner.classList.remove('active');
            }

            if (!data.is_running) {
                showScene('idleScene');
                fill.style.width = '100%';
                fill.classList.remove('warn', 'crit');
                scene.classList.remove('state-warning', 'state-critical');
                showingEnd = false;
                totalSec = 0;
                if (endTimer) { clearTimeout(endTimer); endTimer = null; }
                return;
            }

            // Running
            const secs = parseSecs(data.time_remaining);
            if (!data.is_paused && (totalSec === 0 || secs > totalSec)) totalSec = secs;

            document.getElementById('activityLabel').textContent = data.current_activity || 'READY';
            document.getElementById('activitySub').textContent = data.is_paused ? 'PAUSED' : '';

            // TIME UP check
            let showTimeUp = false;
            if (!data.is_paused && totalSec > 0) {
                showTimeUp = totalSec >= 1800 ? (secs <= 120 && secs > 0) : (secs <= 60 && secs > 0);
            }

            if (showTimeUp) {
                panel.style.display = 'none';
                upDisplay.classList.add('show');
            } else {
                panel.style.display = '';
                upDisplay.classList.remove('show');
                updateDigitLayout(secs);
            }

            showScene('timerScene');

            // End of program
            if (secs <= 0 && data.current_activity && data.current_activity !== 'READY') {
                if (!showingEnd) {
                    showingEnd = true;
                    document.getElementById('endText').textContent = 'THE END';
                    showScene('endScene');
                    totalSec = 0;
                    if (endTimer) clearTimeout(endTimer);
                    endTimer = setTimeout(() => { showingEnd = false; }, 300000);
                }
                return;
            } else {
                showingEnd = false;
                if (endTimer) { clearTimeout(endTimer); endTimer = null; }
            }

            // Progress & warnings
            let pct = totalSec > 0 ? (secs / totalSec) * 100 : 0;
            pct = Math.max(0, Math.min(100, pct));
            fill.style.width = pct + '%';

            scene.classList.remove('state-warning', 'state-critical');
            fill.classList.remove('warn', 'crit');

            if (secs <= 60) {
                scene.classList.add('state-critical');
                fill.classList.add('crit');
            } else if (pct <= 10) {
                scene.classList.add('state-warning');
                fill.classList.add('warn');
            }
        }

        // Fetch initial theme + font
        fetch('/api/kiosk_theme').then(r=>r.json()).then(d => {
            applyTheme(d.theme);
            applyFont(d.font);
        }).catch(()=>{});

        // Boot
        updateClock();
        setInterval(updateClock, 1000);
        updateDisplay();
        setInterval(updateDisplay, 1000);
        checkMessage();
        setInterval(checkMessage, 2000);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) { updateClock(); updateDisplay(); checkMessage(); }
        });
    })();
    </script>
</body>
</html>
